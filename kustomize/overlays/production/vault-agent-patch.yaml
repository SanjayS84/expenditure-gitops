apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-tier
spec:
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "uae-bank-expenditure-role"
        vault.hashicorp.com/agent-inject-secret-database: "database/creds/expenditure-app-role"
        # Template transformation formats credentials as unified JSON inside the backend container
        vault.hashicorp.com/agent-inject-template-database: |
          {{- with secret "database/creds/expenditure-app-role" -}}
          {
            "user": "{{ .Data.username }}",
            "password": "{{ .Data.password }}",
            "dbname": "expenditure_db"
          }
          {{- end -}}
