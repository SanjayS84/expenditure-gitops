apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: production-expenditure-app
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-org/expenditure-gitops.git'
    targetRevision: HEAD
    path: kustomize/overlays/production
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: corporate-expenditure-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
