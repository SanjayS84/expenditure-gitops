apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-tier
  labels:
    app: expenditure
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: expenditure
      tier: backend
  template:
    metadata:
      labels:
        app: expenditure
        tier: backend
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "uae-bank-expenditure-role"
        vault.hashicorp.com/agent-inject-secret-database: "database/creds/expenditure-app-role"
        vault.hashicorp.com/agent-inject-template-database: |
          {{- with secret "database/creds/expenditure-app-role" -}}
          export DB_USER="{{ .Data.username }}"
          export DB_PASSWORD="{{ .Data.password }}"
          export DB_NAME="expenditure_db"
          {{- end -}}
    spec:
      containers:
      - name: backend
        image: docker.io/mssanjay84/expenditure-backend:v1
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: MQ_HOST
          value: "rabbitmq-service"
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
